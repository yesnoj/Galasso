version: '3.8'

services:
  gcf-app:
    build: .
    container_name: gcf-platform
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - gcf-data:/app/db
      - gcf-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-gcf-aicare-secret-cambiami-2026}
      - DB_PATH=/app/db/gcf.sqlite
      - UPLOAD_DIR=/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gcf-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token eyJhIjoiMGM3MmJiMGJjN2RjMWY4Y2ExMzRkNTBlYjE4ZmY1NjgiLCJ0IjoiNDMxNjVjMDgtYzQyZC00ZWNmLWE2YmQtMGIwZjZhYTI4ZGZmIiwicyI6Ik5EYzVaV1ZqTm1ZdFpqQmtaQzAwT1dJM0xUbGtZV0l0T1ROaFlURTJNRE00TnpFeSJ9
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml
    depends_on:
      - gcf-app
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  gcf-data:
    driver: local
  gcf-uploads:
    driver: local
